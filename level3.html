<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess the Artist - Level 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #e2e8f0;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .game-wrapper {
      padding: 20px;
      flex-grow: 1;
      position: relative;
      z-index: 10;
    }
    .game-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .options-container {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }
    .artist-option {
      height: 84px;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
    }
    .artist-option:hover {
        border-color: #06b6d4;
        box-shadow: 0 0 15px rgba(6,182,212,0.3);
    }
    .artist-option.selected {
        transform: scale(1.02);
    }
    .artist-option img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      pointer-events: none;
      background-color: #1a1a2e;
    }
    .artist-label {
      flex-grow: 1;
      text-align: left;
      pointer-events: none;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
    }

    /* Feedback Styles */
    .artist-option.correct {
      border-color: #34d399;
      background: rgba(52, 211, 153, 0.2);
      box-shadow: 0 0 15px rgba(52, 211, 153, 0.5);
    }
    .artist-option.incorrect {
      border-color: #f43f5e;
      background: rgba(244, 63, 94, 0.2);
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.5);
    }
    .options-container.disabled .artist-option:not(.selected) {
        opacity: 0.4;
        cursor: not-allowed;
        pointer-events: none;
    }
    .options-container.disabled .artist-option.correct {
        opacity: 1;
    }

    .button-group {
      margin-top: 30px;
    }
    #result-container {
        margin-top: 20px;
        font-size: 28px;
        font-weight: 900;
        min-height: 40px;
        text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    #final-feedback-container {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }
    #final-feedback-container img {
        max-width: 100%;
        height: auto;
        border-radius: 12px;
        max-height: 250px;
        object-fit: contain;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    #final-feedback-caption {
        font-size: 1.5em;
        font-weight: 900;
        color: #fff;
        text-shadow: 0 0 10px #ec4899;
    }
  </style>
</head>
<body>

  <!-- Ambient Lights -->
  <div class="fixed top-0 left-1/4 w-96 h-96 bg-pink-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse pointer-events-none z-0"></div>
  <div class="fixed bottom-0 right-1/4 w-96 h-96 bg-cyan-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse pointer-events-none z-0"></div>

  <!-- Shared Navigation -->
  <nav class="glass sticky top-0 z-50 p-4 shadow-2xl">
    <div class="max-w-4xl mx-auto flex flex-wrap justify-center gap-6 text-sm font-bold tracking-widest uppercase">
        <a href="index.html" class="text-gray-400 hover:text-cyan-400 transition pb-1">LVL 1: Reveal</a>
        <a href="level2.html" class="text-gray-400 hover:text-cyan-400 transition pb-1">LVL 2: Unjumble</a>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 border-b-2 border-pink-500 pb-1">LVL 3: Ranking</span>
        <a href="level4.html" class="text-gray-400 hover:text-cyan-400 transition pb-1">LVL 4: Memory</a>
        <a href="level5.html" class="text-gray-400 hover:text-cyan-400 transition pb-1">LVL 5: Puzzle</a>
    </div>
  </nav>

  <div class="game-wrapper">
    <div class="game-container glass">
      <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500 tracking-widest uppercase mb-4 drop-shadow-md">Guess the Rank</h1>
      <h2 id="question-text" class="text-2xl text-purple-300 font-bold tracking-wider drop-shadow">Loading...</h2>
      
      <ul id="options-list" class="options-container mt-6">
      </ul>

      <div id="result-container"></div>
      <div id="final-feedback-container"></div>

      <div class="button-group">
        <button id="next-button" onclick="nextQuestion()" disabled class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 disabled:opacity-50 disabled:from-gray-600 disabled:to-gray-700 font-black py-3 px-10 rounded-full uppercase transition transform hover:scale-105 shadow-[0_0_15px_rgba(6,182,212,0.4)] tracking-widest text-lg">Next 🎵</button>
      </div>
    </div>
  </div>

        { w: 'AESPA', id: 'https://upload.wikimedia.org/wikipedia/commons/5/57/Aespa_%28%EC%97%90%EC%8A%A4%ED%8C%8C%29_31st_HMA_2024_%284%29.png' },
        { w: 'Lil Hao', id: 'Images\\Lil Hao.jpg' },

        { w: 'Soft Lipa (蛋堡)', id: 'Images\\Soft Lipa (蛋堡).jpg' },
        { w: 'Bestards (理想混蛋)', id: 'Images\\Bestards (理想混蛋).jpg' },
        { w: 'Aden Wang (王Aden)', id: 'Images\\Aden Wang (王Aden).jpg' },
        { w: '9m88', id: 'Images\\9m88.jpg' },
        { w: 'Jolin Tsai (蔡依林)', id: 'https://upload.wikimedia.org/wikipedia/commons/f/fc/Jolin_Tsai_Elixir_2023.jpg' },
        { w: 'Travis Scott', id: 'https://upload.wikimedia.org/wikipedia/commons/1/14/Travis_Scott_-_Openair_Frauenfeld_2019_08.jpg' },
        { w: '義義', id: 'Images\\義義.jpg' },
        { w: 'Pharrell Williams', id: 'https://upload.wikimedia.org/wikipedia/commons/f/f4/Pharrell_Williams_at_The_Lion_King_European_Premiere_2019.png' },
        { w: '揽佬 SKAI ISYOURGOD', id: 'Images\\揽佬 SKAI ISYOURGOD.webp' },
        { w: 'KENDRICK Lamar', id: 'https://upload.wikimedia.org/wikipedia/commons/0/05/Pulitzer2018-portraits-kendrick-lamar_%28cropped%29.jpg' },
        { w: 'Jay-Z', id: 'https://upload.wikimedia.org/wikipedia/commons/9/9c/Jay-Z_%40_Shawn_%27Jay-Z%27_Carter_Foundation_Carnival_%28crop_2%29.jpg' },
        { w: 'Eminem', id: 'https://upload.wikimedia.org/wikipedia/commons/0/0f/Eminem_2021_Color_Corrected.jpg' },
        { w: 'Rihanna', id: 'https://upload.wikimedia.org/wikipedia/commons/0/04/Rihanna_5%2C_2012.jpg' },
        { w: 'Adele', id: 'https://upload.wikimedia.org/wikipedia/commons/7/7c/Adele_2016.jpg' },
        { w: 'Lady Gaga', id: 'https://upload.wikimedia.org/wikipedia/commons/7/74/Lady_Gaga_at_interview_in_2016_%28cropped%29.jpg' },
        { w: 'Oliver Tree', id: 'https://upload.wikimedia.org/wikipedia/commons/4/44/Oliver_Tree_%283x4%29.jpg' },
        { w: 'TFBoys ', id: 'https://upload.wikimedia.org/wikipedia/commons/2/2f/TFBOYS_%28%E7%8E%8B%E4%BF%8A%E5%87%AF-%E7%8E%8B%E6%BA%90-%E6%98%93%E7%83%8A%E5%8D%83%E7%8E%BA%29_1.jpg' },
        { w: 'Maneskin', id: 'https://upload.wikimedia.org/wikipedia/commons/3/3b/Maneskin_2018.jpg' }
      ];

      // --- STATE VARIABLES ---
      let currentIdx = 0;
      let score = 0;

      // --- DOM ELEMENTS ---
      const questionEl = document.getElementById('question-text');
      const optionsList = document.getElementById('options-list');
      const nextButton = document.getElementById('next-button');
      const resultContainer = document.getElementById('result-container');
      const finalFeedbackContainer = document.getElementById('final-feedback-container'); 

      // --- FEEDBACK IMAGES ---
      const HIGH_SCORE_IMAGE = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-gdReklsKXOqjBMFAr5QxG7sCdGsmSjzm5Q&s';
      const LOW_SCORE_IMAGE = 'https://i.imgflip.com/2sjkfa.jpg';
      
      // --- FUNCTIONS ---

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function displayQuestion() {
        // Reset UI
        resultContainer.textContent = '';
        finalFeedbackContainer.innerHTML = '';
        optionsList.innerHTML = '';
        optionsList.classList.remove('disabled');
        nextButton.disabled = true;

        if (currentIdx >= ARTIST_DATA.length) {
            showFinalScore();
            return;
        }

        const correctArtist = ARTIST_DATA[currentIdx];
        
        // --- GAME MODE: RANKING (Sequential) ---
        questionEl.innerHTML = `Which artist is Rank #${currentIdx + 1}?`;

        // Get 5 random distractors (unique)
        const others = ARTIST_DATA.filter(a => a.w !== correctArtist.w);
        const shuffledOthers = shuffleArray(others).slice(0, 7); 

        // Combine and shuffle
        const finalOptions = shuffleArray([correctArtist, ...shuffledOthers]);

        // Render options
        finalOptions.forEach(artist => {
          const li = document.createElement('li');
          li.className = 'artist-option';
          li.dataset.name = artist.w;
          li.innerHTML = `
            <img src="${artist.id}" alt="${artist.w}" onerror="this.src='https://placehold.co/60x60/f0f4f8/9ca3af?text=?'">
            <span class="artist-label">${artist.w}</span>
          `;
          li.addEventListener('click', handleOptionSelect);
          optionsList.appendChild(li);
        });
      }

      function handleOptionSelect(event) {
        const selectedOption = event.currentTarget;
        const selectedName = selectedOption.dataset.name;
        const correctName = ARTIST_DATA[currentIdx].w;

        // Disable grid
        optionsList.classList.add('disabled');
        selectedOption.classList.add('selected');

        if (selectedName === correctName) {
          score++;
          selectedOption.classList.add('correct');
          resultContainer.textContent = 'Correct! 🔥';
          resultContainer.style.color = '#34d399';
          resultContainer.style.textShadow = '0 0 15px rgba(52,211,153,0.6)';
        } else {
          selectedOption.classList.add('incorrect');
          resultContainer.textContent = 'Sugar! 🥸💔🤬';
          resultContainer.style.color = '#f43f5e';
          resultContainer.style.textShadow = '0 0 15px rgba(244,63,94,0.6)';
          
          // Highlight correct one
          const correctEl = optionsList.querySelector(`[data-name="${correctName}"]`);
          if (correctEl) {
            correctEl.classList.add('correct');
          }
        }

        // Enable next button
        nextButton.disabled = false;
        if(currentIdx === ARTIST_DATA.length - 1){
            nextButton.textContent = "See Score";
        } else {
            nextButton.textContent = "Next 🎵";
        }
      }

      function showFinalScore() {
        document.querySelector('h1').style.display = 'none';
        questionEl.style.display = 'none';
        optionsList.style.display = 'none';
        nextButton.style.display = 'none';
        resultContainer.innerHTML = '';

        const totalQuestions = ARTIST_DATA.length;
        const percentage = (score / totalQuestions) * 100;

        let finalImageSrc = '';
        let finalCaption = '';

        if (percentage >= 80) {
            finalImageSrc = HIGH_SCORE_IMAGE;
            finalCaption = 'Great job! You know your music!';
        } else {
            finalImageSrc = LOW_SCORE_IMAGE;
            finalCaption = `Final Score: ${score} / ${totalQuestions}`;
        }

        finalFeedbackContainer.innerHTML = `
            <img src="${finalImageSrc}" alt="Final Score">
            <div id="final-feedback-caption">${finalCaption}</div>
            <button class="bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-400 hover:to-purple-500 text-white font-black py-4 px-10 rounded-full uppercase tracking-widest mt-6 transform transition hover:scale-105 shadow-[0_0_20px_rgba(236,72,153,0.5)]" onclick="location.reload()">Play Again</button>
        `;
      }

      window.nextQuestion = function() {
        currentIdx++;
        displayQuestion();
      };

      // Start
      displayQuestion();
    });
  </script>
</body>
</html>
