        .card-back { background-size: cover; background-position: center; transform: rotateY(180deg); border: 2px solid #a855f7; }

        { w: 'ITZY', id: 'https://upload.wikimedia.org/wikipedia/commons/8/83/Itzy_230102.jpg' },
        { w: 'MJ116 (頑童)', id: 'Images\\MJ116 (頑童).jpg' },
        { w: 'Soft Lipa (蛋堡)', id: 'Images\\Soft Lipa (蛋堡).jpg' },
        { w: 'Bestards (理想混蛋)', id: 'Images\\Bestards (理想混蛋).jpg' },
        { w: 'Aden Wang (王Aden)', id: 'Images\\Aden Wang (王Aden).jpg' },
        { w: '9m88', id: 'Images\\9m88.jpg' }
        ];

        let cards = [], flipped = [], locked = false;

        function init() {
            const grid = document.getElementById('grid');
            // Select 8 artists, duplicate to make 16 cards
            const selected = ARTIST_DATA.sort(() => Math.random() - 0.5).slice(0, 8);
            cards = [...selected, ...selected].sort(() => Math.random() - 0.5);
            
            cards.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.name = item.w;
                card.innerHTML = `
                    <div class="card-face card-front">🎵</div>
                    <div class="card-face card-back" style="background-image: url('${item.id}')"></div>
                `;
                card.onclick = () => flip(card);
                grid.appendChild(card);
            });
        }

        function flip(card) {
            if (locked || card.classList.contains('flipped')) return;
            card.classList.add('flipped');
            flipped.push(card);

            if (flipped.length === 2) {
                locked = true;
                if (flipped[0].dataset.name === flipped[1].dataset.name) {
                    flipped = []; locked = false;
                } else {
                    setTimeout(() => {
                        flipped[0].classList.remove('flipped');
                        flipped[1].classList.remove('flipped');
                        flipped = []; locked = false;
                    }, 1000);
                }
            }
        }
        init();
    </script>
