<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Guess the Artist - Level 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e2e8f0; 
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .memory-card { aspect-ratio: 1; cursor: pointer; transition: transform 0.3s; position: relative; transform-style: preserve-3d; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 0.5rem; }
        
        .card-front { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(5px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; /* Reduced font size for smaller cards */
            box-shadow: inset 0 0 20px rgba(236, 72, 153, 0.2);
            transition: all 0.3s ease;
        }
        .memory-card:hover .card-front {
            border-color: #06b6d4;
            box-shadow: inset 0 0 20px rgba(6, 182, 212, 0.4), 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .card-back { 
            background-size: cover; background-position: center; transform: rotateY(180deg); 
            border: 2px solid #06b6d4; 
            box-shadow: 0 0 10px rgba(6,182,212,0.5);
        }
        .memory-card.flipped { transform: rotateY(180deg); }
    </style>
</head>
<body class="flex flex-col min-h-screen relative overflow-x-hidden">

    <div class="fixed top-0 left-1/4 w-96 h-96 bg-pink-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse pointer-events-none z-0"></div>

    <nav class="glass sticky top-0 z-50 p-4 shadow-2xl">
        <div class="max-w-4xl mx-auto flex flex-wrap justify-center gap-6 text-sm font-bold tracking-widest uppercase">
            <a href="index.html" class="text-gray-400 hover:text-cyan-400 transition pb-1">LVL 1: Reveal</a>
            <a href="level2.html" class="text-gray-400 hover:text-cyan-400 transition pb-1">LVL 2: Unjumble</a>
            <a href="level3.html" class="text-gray-400 hover:text-cyan-400 transition pb-1">LVL 3: Ranking</a>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 border-b-2 border-pink-500 pb-1">LVL 4: Memory</span>

    <div class="flex-grow flex items-center justify-center p-4 relative z-10 w-full">

            <div id="grid" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-8 gap-2 md:gap-3 mx-auto perspective-1000"></div>

        { w: 'STRAY KIDS', id: 'https://upload.wikimedia.org/wikipedia/commons/c/c0/Stray_Kids_in_2026.png', hint: 'K-pop boy group known for their innovative music and impressive choreography.' },

        { w: 'Hiroyuki Sawano', id: 'Images/Hiroyuki Sawano (澤野弘之).jpg' , hint: 'Japanese composer known for his work on anime soundtracks and dramatic orchestral pieces.' },
        { w: 'IU', id: 'Images/IU.jpg' , hint: 'South Korean singer-songwriter known for her sweet vocals and heartfelt lyrics.' },
        { w: 'YENA', id: 'https://upload.wikimedia.org/wikipedia/commons/5/5e/20241004_Choi_Yena_Music_Bank_2024_05.jpg', hint: 'South Korean singer-songwriter known for her powerful vocals and dynamic performances.' },
        { w: 'Liu Yuning', id: 'https://upload.wikimedia.org/wikipedia/commons/0/03/Liu_Yuning_%E5%88%98%E5%AE%87%E5%AE%81_20191222_%E6%88%91%E4%BB%AC%E7%9A%84%E6%AD%8C2.jpg', hint: 'Chinese singer-songwriter known for his versatile voice and emotional performances.' },
        { w: 'Jungkook', id: 'https://upload.wikimedia.org/wikipedia/commons/8/88/Jeon_Jung-kook_performing_%22Fake_Love%22_during_Love_Yourself_tour_in_Berlin%2C_16_October_2018_06.jpg', hint: 'South Korean singer and dancer known for his impressive vocal range and stage presence.' },
        { w: 'Justin Bieber', id: 'https://upload.wikimedia.org/wikipedia/commons/d/da/Justin_Bieber_in_2015.jpg', hint: 'Canadian singer-songwriter known for his pop hits and charismatic personality.' },
        { w: 'TOMORROW X TOGETHER', id: 'https://upload.wikimedia.org/wikipedia/commons/9/98/Tomorrow_X_Together_at_a_Dior_event_in_2025_02.jpg', hint: 'K-pop boy group known for their unique style and impressive dance skills.' },
        { w: 'ITZY', id: 'https://upload.wikimedia.org/wikipedia/commons/8/83/Itzy_230102.jpg', hint: 'K-pop girl group known for their energetic performances and catchy songs.' },
        { w: 'MJ116', id: 'Images/MJ116 (頑童).jpg' , hint: 'Chinese hip-hop group known for their innovative style and social commentary.' },
        { w: 'Soft Lipa', id: 'Images/Soft Lipa (蛋堡).jpg' , hint: 'Chinese rapper and songwriter known for his unique flow and lyrical prowess.' },
        { w: 'Bestards', id: 'Images/Bestards (理想混蛋).jpg' , hint: 'Chinese rock band known for their rebellious spirit and socially conscious lyrics.' },
        { w: 'Aden Wang', id: 'Images/Aden Wang (王Aden).jpg' , hint: 'Chinese singer-songwriter known for his emotional depth and melodic sensibility.' },
        { w: '9m88', id: 'Images/9m88.jpg' , hint: 'Chinese rapper known for his aggressive style and powerful delivery.' }
        ];

        let cards = [], flipped = [], locked = false;

        function init() {
            const grid = document.getElementById('grid');
            
            // Select 20 unique artists, duplicate them to make 40 cards total
            const selected = ARTIST_DATA.sort(() => Math.random() - 0.5).slice(0, 20);
            cards = [...selected, ...selected].sort(() => Math.random() - 0.5);
            
            cards.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.name = item.w;
                card.innerHTML = `
                    <div class="card-face card-front shadow-lg">🎵</div>
                    <div class="card-face card-back" style="background-image: url('${item.id}')"></div>
                `;
                card.onclick = () => flip(card);
                grid.appendChild(card);
            });
        }

        function flip(card) {
            if (locked || card.classList.contains('flipped')) return;
            card.classList.add('flipped');
            flipped.push(card);

            if (flipped.length === 2) {
                locked = true;
                if (flipped[0].dataset.name === flipped[1].dataset.name) {
                    flipped = []; locked = false;
                } else {
                    setTimeout(() => {
                        flipped[0].classList.remove('flipped');
                        flipped[1].classList.remove('flipped');
                        flipped = []; locked = false;
                    }, 1000);
                }
            }
        }
        init();
    </script>
</body>
</html>
