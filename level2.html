        let target = '';
        
        function loadLevel() {
            const artist = ARTIST_DATA[Math.floor(Math.random() * ARTIST_DATA.length)];
            target = artist.w;
            document.getElementById('image').style.backgroundImage = `url('${artist.id}')`;
            
            let scrambled = target.replace(/\s/g, '').split('').sort(() => Math.random() - 0.5).join('');
            document.getElementById('scrambled').textContent = scrambled;
            document.getElementById('answer').value = '';
        }

        document.getElementById('verify').onclick = () => {
            const input = document.getElementById('answer').value.replace(/\s/g, '').toLowerCase();
            if(input === target.replace(/\s/g, '').toLowerCase()) {
                alert('Correct! Decryption successful.');
                loadLevel();
            } else {
                alert('Invalid Code. Try again.');
            }
        };

        loadLevel();
