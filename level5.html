            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: 320px; height: 320px;

            transition: all 0.5s ease;
        }
        .puzzle-piece { 
            width: 100%; height: 100%; cursor: pointer; background-color: #0f0c29; 
            position: relative; transition: transform 0.2s; 
        }
        .puzzle-piece.selected { 
            border: 3px solid #06b6d4; transform: scale(0.9); z-index: 10;

        let selected = null;

        function initPuzzle() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            document.getElementById('next').classList.add('hidden');
            grid.style.border = '2px solid rgba(236, 72, 153, 0.5)';
            grid.style.boxShadow = '0 0 30px rgba(236, 72, 153, 0.3)';

            const artist = ARTIST_DATA[Math.floor(Math.random() * ARTIST_DATA.length)];
            let pieces = [];

            for (let i = 0; i < 9; i++) {
                let piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                piece.dataset.index = i;
                piece.style.backgroundImage = `url('${artist.id}')`;
                piece.style.backgroundSize = `300% 300%`;
                
                let x = (i % 3) * 50;
                let y = Math.floor(i / 3) * 50;
                piece.style.backgroundPosition = `${x}% ${y}%`;
                pieces.push(piece);
            }

            pieces.sort(() => Math.random() - 0.5).forEach(p => {
                grid.appendChild(p);
                p.onclick = () => handleTap(p, grid);
            });
        }

        function handleTap(piece, grid) {
            if (!selected) {
                selected = piece;
                piece.classList.add('selected');
            } else if (selected === piece) {
                selected.classList.remove('selected');
                selected = null;
            } else {
                // Swap logic in DOM
                let temp = document.createElement('div');
                grid.insertBefore(temp, piece);
                grid.insertBefore(piece, selected);
                grid.insertBefore(selected, temp);
                temp.remove();

                selected.classList.remove('selected');
                selected = null;
                checkWin(grid);
            }
        }

        function checkWin(grid) {
            let win = true;
            Array.from(grid.children).forEach((p, index) => {
                if (parseInt(p.dataset.index) !== index) win = false;
            });
            if (win) {
                Array.from(grid.children).forEach(p => p.onclick = null);
                grid.style.border = '3px solid #06b6d4';
                grid.style.boxShadow = '0 0 40px rgba(6,182,212,0.8)';
                document.getElementById('next').classList.remove('hidden');
            }
        }

        document.getElementById('next').onclick = initPuzzle;
        initPuzzle();
